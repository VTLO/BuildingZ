name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual triggering

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build Angular app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Capacitor
        run: |
          npm install @capacitor/core
          npm install -D @capacitor/cli @capacitor/android

      - name: Initialize Capacitor and Add Android
        run: |
          # Initialize Capacitor with the Angular build output directory if not exists
          if [ ! -f capacitor.config.ts ] && [ ! -f capacitor.config.json ]; then
            npx cap init "AS400 Simulator" "com.as400.simulator" --web-dir dist/app/browser
          fi
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Build APK
        working-directory: ./android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: as400-simulator-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
