name: Android & Web Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'

    # Build web sans clé : ce bundle est servi par le serveur Express,
    # qui détient la clé côté serveur.
    - name: Build Web App
      run: npm run build

    - name: Upload Web Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

    # Rebuild avec la clé intégrée : ce bundle part dans l'APK autonome,
    # qui appelle Gemini directement depuis l'appareil.
    - name: Build Web App (APK autonome)
      run: npm run build
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    - name: Set up JDK 22
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '22'
        cache: 'gradle'

    - name: Initialize Capacitor Android
      run: |
        npx cap add android
        npx cap sync android

    - name: Build Android APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Android APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Create GitHub Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        files: android/app/build/outputs/apk/debug/app-debug.apk
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}